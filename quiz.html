<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>IMPOSSIBLE QUIZ</title>
    <style>
        body {
            background: #000;
            color: #0f0;
            font-family: "Impact", sans-serif;
            text-align: center;
            overflow: hidden;
        }
        .container {
            border: 10px solid #f0f;
            background: rgba(0,0,0,0.8);
            margin: 50px auto;
            padding: 20px;
            max-width: 600px;
            animation: shake 0.1s infinite;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: blue;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            border: 3px solid white;
        }
        #fail {
            display: none;
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: red; color: black; z-index: 99;
            flex-direction: column; align-items: center; justify-content: center;
        }
        @keyframes shake {
            0% { transform: rotate(1deg); }
            100% { transform: rotate(-1deg); }
        }
    </style>
</head>
<body>

    <div id="quiz-box" class="container">
        <h1 style="color: yellow;">MATURITA QUIZ 2026</h1>
        <p id="question" style="font-size: 1.5rem;">Načítám...</p>
        <div id="options">
            <button class="btn" onclick="fail()">Odpověď A</button>
            <button class="btn" onclick="fail()">Odpověď B</button>
            <button class="btn" onclick="fail()">Big Chungus</button>
            <button class="btn" onclick="fail()">420 Blaze it</button>
        </div>
    </div>

    <div id="fail">
        <h1 style="font-size: 5rem;">GET REKT NOOB</h1>
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueW96eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7TKMGpxxcaOZYEOA/giphy.gif" width="400">
        <h2>DOSTAL JSI ZA 5. JDI DOMŮ.</h2>
        <a href="index.html" style="color: white; font-size: 2rem;">Zkusit znovu</a>
    </div>

    <script>
        const q = [
            "Byl Jan Neruda ve skutečnosti Snoop Dogg?",
            "Kolik Doritos snědl Molière před psaním Lakomce?",
            "Je Robinson Crusoe první Battle Royale?",
            "George Orwell 1984: Viděl tě včera ve sprše?"
        ];

        window.onload = function() {
            document.getElementById('question').innerText = q[Math.floor(Math.random() * q.length)];
        };

        function fail() {
            document.getElementById('quiz-box').style.display = 'none';
            document.getElementById('fail').style.display = 'flex';
        }
    </script>
</body>
</html>
