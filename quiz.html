<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>QUIZ | DANK EDITION</title>
    <style>
        body { background: #000; color: #0f0; font-family: "Impact", sans-serif; text-align: center; overflow: hidden; }
        .box { border: 10px solid #0f0; background: rgba(0,0,0,0.9); margin: 50px auto; padding: 20px; max-width: 600px; animation: shake 0.05s infinite; }
        .opt { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #00f; color: #fff; font-size: 1.5rem; border: 4px solid #fff; cursor: pointer; }
        #fail { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: red; z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
        @keyframes shake { 0% { transform: translate(3px, 3px); } 100% { transform: translate(-3px, -3px); } }
    </style>
</head>
<body>

<div id="game" class="box">
    <h1 style="color: yellow;">MATURITA QUIZ 2026</h1>
    <h2 id="question">Načítám...</h2>
    <div id="answers"></div>
</div>

<div id="fail">
    <h1 style="font-size: 5rem; color: black;">L + RATIO + NOOB</h1>
    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHRydHh5M3R4eDN4ZzN4ZzN4ZzN4ZzN4ZzN4ZzN4ZzN4ZzN4ZzN4ZzN4ZzN4ZzN4ZzN4JlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/6uGhT1O4sxPi8/giphy.gif" width="400">
    <br>
    <a href="index.html" style="font-size: 2rem; color: white; background: black; padding: 10px;">Zkusit znovu</a>
</div>

<script>
    const questions = ["Kdo je Big Chungus literatury?", "Měl Jan Neruda 420 noscope?", "Je Braník v akci maturitní otázka?"];
    const bs = ["360 Noscope", "Mom get the camera", "Smoke weed", "Sample Text", "Hitmarker"];

    window.onload = function() {
        document.getElementById('question').innerText = questions[Math.floor(Math.random() * questions.length)];
        let cont = document.getElementById('answers');
        for(let i=0; i<4; i++) {
            let b = document.createElement('button');
            b.className = "opt";
            b.innerText = bs[Math.floor(Math.random()*bs.length)];
            b.onclick = function() {
                document.getElementById('game').style.display = 'none';
                document.getElementById('fail').style.display = 'flex';
            };
            cont.appendChild(b);
        }
    };
</script>
</body>
</html>
