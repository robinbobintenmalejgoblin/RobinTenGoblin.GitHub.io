<!DOCTYPE html>
<html lang="cs">
<head>

    <title>ULTIMATE BULLSHIT QUIZ</title>
    <style>

        .box { border: 10px solid #0f0; background: rgba(0,0,0,0.9); margin: 50px auto; padding: 20px; max-width: 700px; animation: shake 0.05s infinite; }
        .opt { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #00f; color: #fff; font-size: 1.5rem; border: 4px solid #fff; cursor: pointer; }
        #fail { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: red; z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
        @keyframes shake { 0% { transform: translate(5px, 5px); } 100% { transform: translate(-5px, -5px); } }
    </style>
</head>
<body>

<div id="game" class="box">
    <h1 style="color: yellow; font-size: 3rem;">MATURITNÍ PEKLO 2026</h1>
    <h2 id="q" style="color: cyan;">Načítám sračky...</h2>

</body>
</html>
