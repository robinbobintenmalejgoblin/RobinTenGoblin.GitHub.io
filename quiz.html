<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>ULTIMATE BULLSHIT QUIZ</title>
    <style>
        body { background: #000; color: #0f0; font-family: "Impact", sans-serif; text-align: center; overflow-x: hidden; }
        .box { border: 10px solid #0f0; background: rgba(0,0,0,0.9); margin: 30px auto; padding: 20px; max-width: 800px; animation: shake 0.05s infinite; }
        .opt-zone { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        .opt { padding: 10px 20px; background: #00f; color: #fff; font-size: 1.2rem; border: 3px solid #fff; cursor: pointer; min-width: 150px; }
        .opt:hover { background: #f0f; transform: scale(1.1); }
        #fail { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: red; z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
        @keyframes shake { 0% { transform: translate(2px, 2px); } 100% { transform: translate(-2px, -2px); } }
    </style>
</head>
<body>

<div id="game" class="box">
    <h1 style="color: yellow; font-size: 3rem;">MATURITNÍ PEKLO 2026</h1>
    <h2 id="question" style="color: cyan;">Načítám sračky...</h2>
    <div id="answers" class="opt-zone"></div>
</div>

<div id="fail">
    <h1 style="font-size: 6rem; color: black; margin: 0;">L + RATIO + NOOB</h1>
    <img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHRydHh5M3R4eDN4ZzN4ZzN4ZzN4ZzN4ZzN4ZzN4ZzN4ZzN4ZzN4ZzN4ZzN4ZzN4JlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/6uGhT1O4sxPi8/giphy.webp" width="400">
    <br>
    <a href="index.html" style="font-size: 2rem; color: white; background: black; padding: 15px; text-decoration: none; border: 4px solid yellow;">TRY AGAIN</a>
</div>

<script>
    const questions = [
        "Kdo napsal Máj, pokud byl Mácha ve skutečnosti Big Chungus?",
        "Kolik Mountain Dew vypil Jan Neruda před 360 noscopem?",
        "Je Molièrův Lakomec metaforou pro Pay-to-Win hry?",
        "Měl Robinson Crusoe na ostrově dostatek weed?",
        "Kolik hitmarkerů dostal Svatopluk Čech v bitvě u Lipan?",
        "Byl Jan Amos Komenský první YouTuber (Učitel národů)?",
        "Pokud Shrek napsal Fausta, byl Faust Ogre?"
    ];

    const bullshit = [
        "420 noscope", "XBOX LIVE", "Smoke weed", "Sample Text", "Hitmarker", 
        "Big Chungus", "Shrek is love", "Doge", "Mountain Dew", "Doritos", 
        "Obunga", "Sanic", "Ugandan Knuckles", "Illuminati Confirmed", 
        "MLG Airhorn", "Wasted", "You Died", "Get Rekt", "Noob", "Git Gud"
    ];

    function load() {
        // Random Question
        document.getElementById('question').innerText = questions[Math.floor(Math.random() * questions.length)];
        
        let cont = document.getElementById('answers');
        cont.innerHTML = "";
        
        // Random number of answers (between 3 and 8)
        let count = Math.floor(Math.random() * 6) + 3;
        
        // Shuffle and pick unique bullshit answers
        let shuffled = bullshit.sort(() => 0.5 - Math.random());
        let selected = shuffled.slice(0, count);

        selected.forEach(text => {
            let b = document.createElement('button');
            b.className = "opt";
            b.innerText = text;
            b.onclick = () => { 
                document.getElementById('game').style.display = 'none'; 
                document.getElementById('fail').style.display = 'flex'; 
            };
            cont.appendChild(b);
        });
    }
    window.onload = load;
</script>
</body>
</html>
