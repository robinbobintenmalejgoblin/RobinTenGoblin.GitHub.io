<!DOCTYPE html>

    <style>
        body {
            /* POV Driving GIF Background */
            background-image: url('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueW96eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7TKMGpxxcaOZYEOA/giphy.gif');
            background-size: cover;
            background-attachment: fixed;
            color: #ffff00;
            font-family: "Comic Sans MS", cursive;
            margin: 0;
            overflow: hidden;
            cursor: progress;
        }

        /* The Drunk Shake Effect on everything */
        .drunk-overlay {
            width: 100vw;
            height: 100vh;
            animation: vision-blur 2s infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .sketchy-container {
            border: 10px solid #f00;
            background: rgba(255, 255, 255, 0.8);
            color: black;
            width: 350px;
            padding: 20px;
            text-align: center;
            animation: shake 0.1s infinite, rotate 4s infinite linear;
        }

        .duff-hand {
            position: fixed;
            bottom: -20px;
            right: 10%;
            width: 400px;
            z-index: 999;
            pointer-events: none;
            animation: drink-bob 1.5s infinite ease-in-out;
        }

        .ad-flash {
            background: yellow;
            color: red;
            font-weight: bold;
            font-size: 25px;
            animation: blink 0.2s infinite;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            font-size: 20px;
            color: white;
            background: blue;
            padding: 10px;
            text-decoration: blink;
            font-weight: bold;
            border: 5px outset white;
        }

        /* Animations */
        @keyframes vision-blur {
            0% { filter: blur(0px) hue-rotate(0deg); transform: scale(1); }
            50% { filter: blur(4px) hue-rotate(90deg); transform: scale(1.1); }
            100% { filter: blur(0px) hue-rotate(360deg); transform: scale(1); }
        }

        @keyframes shake {
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(2px, -2px); }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(5deg); }
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes drink-bob {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-50px) rotate(-10deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        marquee {
            background: rgba(255, 0, 0, 0.7);
            font-size: 30px;
            position: absolute;
            top: 0;
        }
    </style>
</head>
